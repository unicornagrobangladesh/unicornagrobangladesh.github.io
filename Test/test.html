<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Page</title>
    <link rel="stylesheet" href="test.css">
</head>
<body>

    <header>
        <h1>Our Products</h1>
        <nav>
            <h6 class="category" data-category="all">All</h6>
            <h6 class="category" data-category="electronics">Electronics</h6>
            <h6 class="category" data-category="clothing">Clothing</h6>
            <h6 class="category" data-category="home">Home</h6>
            <h6 class="category" data-category="books">Books</h6>
            <h6 class="category" data-category="beauty">Beauty</h6>
        </nav>
    </header>

    <section id="products">
        <div class="product" data-category="electronics">
            <img src="product1.jpg" alt="Product 1">
            <p>Product 1</p>
        </div>
        <div class="product" data-category="clothing">
            <img src="product2.jpg" alt="Product 2">
            <p>Product 2</p>
        </div>
        <div class="product" data-category="home">
            <img src="product3.jpg" alt="Product 3">
            <p>Product 3</p>
        </div>
        <div class="product" data-category="books">
            <img src="product4.jpg" alt="Product 4">
            <p>Product 4</p>
        </div>
        <div class="product" data-category="beauty">
            <img src="product5.jpg" alt="Product 5">
            <p>Product 5</p>
        </div>
        <div class="product" data-category="electronics">
            <img src="product6.jpg" alt="Product 6">
            <p>Product 6</p>
        </div>
    </section>

    <script src="test.js"></script>
</body>
</html>
